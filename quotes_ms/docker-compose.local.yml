services:
  api:
    container_name: quotes_ms
    build:
      dockerfile: local.Dockerfile
      context: .
      target: php
      args:
        - APP_ENV=${APP_ENV}
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      - APP_ENV=${APP_ENV}
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8085:80"
      - "2525:25"
    extra_hosts:
      - "aurora_backend.limatours.test:host-gateway"
    networks:
      - lito_network
networks:
  lito_network:
    external: true
    driver: bridge
    name: lito_network

volumes:
  db-data: ~
  redis_volume:
    driver: local
  mysql_volume:
    driver: local
