version: "3.8"
services:
    api:
        container_name: quotes_ms
        env_file:
            - .env
        build:
            context: .
            dockerfile: Dockerfile
            target: php
            args:
                - APP_ENV=production
        environment:
            - APP_ENV=production
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
        ports:
            - "80:80"
            - "2525:25"
