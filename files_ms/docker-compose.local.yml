version: "3.8"
services:
  api:
    container_name: files_ms
    build:
      dockerfile: local.Dockerfile
      context: .
      target: php
      args:
        - APP_ENV=${APP_ENV}
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      - APP_ENV=${APP_ENV}
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:80"
    extra_hosts:
      - "aurora_backend.limatours.test:host-gateway"
    networks:
      - files_ms_default
    depends_on:
      - database
  database:
    container_name: files_ms_db
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      #MYSQL_USER: '${DB_USERNAME}'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      #MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: '${DB_DATABASE}'
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/conf.d/my-custom.cnf:/etc/mysql/conf.d/my-custom.cnf
    networks:
      - files_ms_default
networks:
  files_ms_default:
    driver: bridge
volumes:
  db-data: ~
