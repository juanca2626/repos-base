version: "3.8"
services:
    api:
        container_name: api
        env_file:
            - .env
        build:
            context: .
            dockerfile: Dockerfile
            target: php
            args:
                - APP_ENV=production
        environment:
            - APP_ENV=production
        working_dir: /var/www
        volumes:
            - ./:/var/www
        ports:
            - "80:80"
