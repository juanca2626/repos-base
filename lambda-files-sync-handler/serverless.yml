          batchSize: 1
  notification-status-fx:
    name: lambda-files-sync-notification-status-${self:provider.stage}
    handler: src/notification-status/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
