          batchSize: 1
  confirmation-code-fx:
    name: lambda-files-sync-confirmation-code-${self:provider.stage}
    handler: src/confirmation-code/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - confirmationCode
              - Arn
          batchSize: 1
  communication-hotel-fx:
    name: lambda-files-sync-communication-hotel-${self:provider.stage}
    handler: src/communication-hotel/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - communicationHotel
              - Arn
          batchSize: 1
  notification-master-services-fx:
    name: lambda-files-sync-notification-master-services-${self:provider.stage}
    handler: src/notification-master-services/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - notificationMasterServices
              - Arn
          batchSize: 1
  date-fx:
    name: lambda-files-sync-date-${self:provider.stage}
    handler: src/date/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
