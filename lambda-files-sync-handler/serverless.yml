service: lambda-files-sync-handler
frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region,'us-east-1'}
  # memorySize: 512  # Aumentar la memoria a 512 MB
  timeout: 180

  environment:
    STAGE: ${self:custom.STAGE}
    BACKEND_URL_FILES_ONEDB: ${self:custom.FILES_ONEDB}
    BACKEND_URL_INFORMIX: ${self:custom.INFORMIX}
    BACKEND_URL_NEW_AURORA: ${self:custom.NEW_AURORA}
    BACKEND_URL_AUTH_COGNITO: ${self:custom.AUTH_COGNITO}
    BACKEND_URL_AMAZON: ${self:custom.AMAZON}
    BACKEND_URL_AURORA: ${self:custom.AURORA}
    BACKEND_URL_AURORA_PROD: ${self:custom.AURORA_PROD}
    BACKEND_URL_S3: ${self:custom.S3}
    BACKEND_URL_HYPERGUEST: ${self:custom.HYPERGUEST}
    TOKEN_HYPERGUEST: ${self:custom.TOKEN_HYPERGUEST}
    CLIENT_APP_ID: ${self:custom.CLIENT_APP_ID}
    CLIENT_APP_SECRET: ${self:custom.CLIENT_APP_SECRET}
    USER_POOL_URL: ${self:custom.USER_POOL_URL}
    WEBSOCKET_ENDPOINT: ${self:custom.WEBSOCKET_ENDPOINT}
    WEBSOCKET_TABLE_NAME: ${self:custom.WEBSOCKET_TABLE_NAME}

custom:
  STAGE: ${self:provider.stage}
  FILES_ONEDB: ${ssm:/FILES_ONEDB/baseURL/${self:provider.stage}}
  INFORMIX: ${ssm:/NodeIFX/baseURL/${self:provider.stage}}
  NEW_AURORA: ${ssm:/MsFiles/baseURL/${self:provider.stage}}
  AUTH_COGNITO: ${ssm:/A3/Auth/baseURL/${self:provider.stage}}
  AMAZON: ${ssm:/SQS/baseURL/${self:provider.stage}}
  AURORA: ${ssm:/A2/baseURL/${self:provider.stage}}
  AURORA_PROD: ${ssm:/A2/baseURL/prod}
  S3: ${ssm:/S3/baseURL/prod}
  HYPERGUEST: ${ssm:/Hyperguest/baseURL/${self:provider.stage}}
  TOKEN_HYPERGUEST: ${ssm:/Hyperguest/token/${self:provider.stage}}
  CLIENT_APP_ID: ${ssm:/Cognito/CLIENT_APP2_ID/${self:provider.stage}}
  CLIENT_APP_SECRET: ${ssm:/Cognito/CLIENT_APP2_SECRET/${self:provider.stage}}
  USER_POOL_URL: ${ssm:/Cognito/DOMAIN/${self:provider.stage}}
  WEBSOCKET_ENDPOINT: ${ssm:/WEBSOCKET/baseURL/${self:provider.stage}}
  WEBSOCKET_TABLE_NAME: WebSocketConnections
  esbuild:
    bundle: true
    minify: true
    sourcemap: false
    target: node20
    exclude: ['aws-sdk']

functions:
  create-fx:
    name: lambda-files-sync-create-${self:provider.stage}
    handler: src/create/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - create
              - Arn
          batchSize: 1
  update-fx:
    name: lambda-files-sync-update-${self:provider.stage}
    handler: src/update/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - update
              - Arn
          batchSize: 1
  schedule-fx:
    name: lambda-files-sync-schedule-${self:provider.stage}
    handler: src/schedule/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - schedule
              - Arn
          batchSize: 1
  vip-fx:
    name: lambda-files-sync-vip-${self:provider.stage}
    handler: src/vip/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - vip
              - Arn
          batchSize: 1
  amounts-fx:
    name: lambda-files-sync-amounts-${self:provider.stage}
    handler: src/amounts/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - amounts
              - Arn
          batchSize: 1
  accommodations-fx:
    name: lambda-files-sync-accommodations-${self:provider.stage}
    handler: src/accommodations/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - accommodations
              - Arn
          batchSize: 1
  cancellation-fx:
    name: lambda-files-sync-cancellation-${self:provider.stage}
    handler: src/cancellation/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - cancellation
              - Arn
          batchSize: 1
  add-fx:
    name: lambda-files-sync-add-${self:provider.stage}
    handler: src/add/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - add
              - Arn
          batchSize: 1
  cancel-file-fx:
    name: lambda-files-sync-cancel-file-${self:provider.stage}
    handler: src/cancel-file/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
