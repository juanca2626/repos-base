          batchSize: 1
resources:
  Resources:
    # CREATE
    create:
      Type: "AWS::SQS::Queue"
      Properties:
        QueueName: sqs-files-sync-create-${self:provider.stage}
        VisibilityTimeout: 200 # Mayor que el timeout de Lambda
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt:
              - createDead
              - Arn
          maxReceiveCount: 50
    createDead:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: sqs-files-sync-create-dead-${self:provider.stage}
    
    # UPDATE
    update:
      Type: "AWS::SQS::Queue"
      Properties:
        QueueName: sqs-files-sync-update-${self:provider.stage}
        VisibilityTimeout: 200 # Mayor que el timeout de Lambda
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt:
