          batchSize: 1
  activate-file-fx:
    name: lambda-files-sync-activate-file-${self:provider.stage}
    handler: src/activate-file/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - activateFile
              - Arn
          batchSize: 1
  repository-fx:
    name: lambda-files-sync-repository-${self:provider.stage}
    handler: src/repository/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - repository
              - Arn
          batchSize: 1
  passengers-fx:
    name: lambda-files-sync-passengers-${self:provider.stage}
    handler: src/passengers/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - passengers
              - Arn
          batchSize: 1
  flights-fx:
    name: lambda-files-sync-flights-${self:provider.stage}
    handler: src/flights/handler.handler
    reservedConcurrency: 3
    events:
      - sqs:
          arn:
